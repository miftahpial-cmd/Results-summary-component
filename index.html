<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <title>Frontend Mentor | Results summary component</title>
</head>

<body>
  <section>
    <div class="result">
      <h2 class="hresult">Your Result</h2>
      <div class="circle">
        <span class="ss">76</span>
        <span class="oh">of 100</span>
      </div>
      <h2>Great</h2>
      <p>You scored higher than 65% of the people who have taken these tests.</p>
    </div>
    <div class="summary">
      <h2 class="hsummary">Summary</h2>
      <div class="red_box">
        <div class="left">
          <img src="assets/images/icon-reaction.svg" alt="">
          <p>Reaction</p>
        </div>
        <div class="score">
          <h6>80</h6>
          <span>/ 100</span>
        </div>

      </div>
      <div class="yellow_box">
        <div class="left"><img src="assets/images/icon-memory.svg" alt="">
          <p>Memory</p>
        </div>
        <div class="score">
          <h6>92</h6>
          <span>/ 100</span>
        </div>
      </div>
      <div class="greenteel_box">
        <div class="left"><img src="assets/images/icon-verbal.svg" alt="">
          <p>Verbal</p>
        </div>
        <div class="score">
          <h6>61</h6>
          <span>/ 100</span>
        </div>

      </div>
      <div class="blue_box">
        <div class="left">
          <img src="assets/images/icon-visual.svg" alt="">
          <p>Visual</p>
        </div>
        <div class="score">
          <h6>72</h6>
          <span>/ 100</span>
        </div>
      </div>
      <button>Continue</button>
    </div>
  </section>
</body>

</html>
